<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小さな勝利 - 今日の成功を記録しよう</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>小さな勝利</h1>
            <p class="subtitle">今日の成功を記録しよう</p>
        </header>

        <!-- 入力フォーム -->
        <section class="input-section">
            <h2>今日の小さな勝利を記録</h2>
            <form id="winForm">
                <textarea
                    id="winInput"
                    placeholder="今日の小さな勝利を入力してください...&#10;&#10;例：&#10;- 朝7時に起きた&#10;- 30分散歩した&#10;- 読書を10ページ進めた"
                    maxlength="200"
                    required
                ></textarea>
                <div class="char-count"><span id="charCount">0</span>/200</div>
                <button type="submit" class="submit-btn">記録する</button>
            </form>
        </section>

        <!-- 一覧表示 -->
        <section class="list-section">
            <h2>これまでの小さな勝利</h2>
            <div id="winList" class="win-list">
                <p class="empty-message">まだ記録がありません。今日の小さな勝利から始めましょう！</p>
            </div>
        </section>

        <!-- 統計情報 -->
        <section class="stats-section">
            <h2>統計</h2>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">総記録数</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">連続記録日数</span>
                    <span id="streakCount" class="stat-value">0</span>
                </div>
            </div>
        </section>

        <!-- フィードバック -->
        <section class="feedback-section">
            <h2>フィードバック・お問い合わせ</h2>
            <p class="section-text">バグの報告やご意見・ご要望をお聞かせください</p>
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="feedbackType">種類</label>
                    <select id="feedbackType">
                        <option value="bug">バグ報告</option>
                        <option value="feature">機能要望</option>
                        <option value="other">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="feedbackContent">内容</label>
                    <textarea
                        id="feedbackContent"
                        placeholder="詳細をお書きください..."
                        required
                        rows="5"
                    ></textarea>
                </div>
                <button type="submit" class="feedback-btn">送信する</button>
                <p class="feedback-success" id="feedbackSuccess"></p>
            </form>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
